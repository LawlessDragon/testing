<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070a"/>
      <stop offset="50%" stop-color="#0a1420">
        <animate attributeName="stop-color" values="#0a1420;#0a1e30;#0a1420" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#05070a"/>
    </linearGradient>
    <linearGradient id="borderGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00B8FF" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#0066FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00B8FF" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="avatarGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00B8FF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00B8FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="irisGrad" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#7CF3FF"/>
      <stop offset="45%" stop-color="#00B8FF"/>
      <stop offset="100%" stop-color="#012a44"/>
    </radialGradient>
    <radialGradient id="eyeBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d2130"/>
      <stop offset="100%" stop-color="#040608"/>
    </radialGradient>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="900" height="220" rx="24"/>
    </clipPath>
    <clipPath id="avatarClip">
      <circle cx="115" cy="110" r="62"/>
    </clipPath>
    <clipPath id="typeClip">
      <rect x="228" y="48" width="0" height="56">
        <animate attributeName="width" from="0" to="430" dur="1.6s" fill="freeze"/>
      </rect>
    </clipPath>
    <path id="borderPath" d="M23.5 1.5 L876.5 1.5 A22 22 0 0 1 898.5 23.5 L898.5 196.5 A22 22 0 0 1 876.5 218.5 L23.5 218.5 A22 22 0 0 1 1.5 196.5 L1.5 23.5 A22 22 0 0 1 23.5 1.5 Z"/>
  </defs>

  <g clip-path="url(#cardClip)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -3;0 0" dur="4s" repeatCount="indefinite"/>

      <rect x="0" y="0" width="900" height="220" fill="url(#bg)"/>

      <!-- drifting wing accent -->
      <path d="M 640 220 C 740 120, 820 140, 900 40" fill="none" stroke="#00B8FF" stroke-width="60" stroke-opacity="0.05">
        <animateTransform attributeName="transform" type="translate" values="-10 0;10 0;-10 0" dur="7s" repeatCount="indefinite"/>
      </path>

      <!-- rising embers -->
      <circle cx="150" cy="200" r="2.2" fill="#00B8FF">
        <animate attributeName="cy" values="200;-10" dur="5s" begin="0s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.9;0" dur="5s" begin="0s" repeatCount="indefinite"/>
      </circle>
      <circle cx="330" cy="210" r="1.6" fill="#7CF3FF">
        <animate attributeName="cy" values="210;-10" dur="6.5s" begin="1.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.8;0" dur="6.5s" begin="1.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="520" cy="205" r="2" fill="#00B8FF">
        <animate attributeName="cy" values="205;-10" dur="5.8s" begin="2.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.85;0" dur="5.8s" begin="2.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="700" cy="215" r="1.8" fill="#7CF3FF">
        <animate attributeName="cy" values="215;-10" dur="7s" begin="0.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.8;0" dur="7s" begin="0.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="820" cy="195" r="2.3" fill="#00B8FF">
        <animate attributeName="cy" values="195;-10" dur="5.2s" begin="1.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.9;0" dur="5.2s" begin="1.8s" repeatCount="indefinite"/>
      </circle>

      <!-- top / bottom scale strips -->
      <path d="M 0 0 L 10 8 L 20 0 L 30 8 L 40 0 L 50 8 L 60 0 L 70 8 L 80 0 L 90 8 L 100 0 L 110 8 L 120 0 L 130 8 L 140 0 L 150 8 L 160 0 L 170 8 L 180 0 L 190 8 L 200 0 L 210 8 L 220 0 L 230 8 L 240 0 L 250 8 L 260 0 L 270 8 L 280 0 L 290 8 L 300 0 L 310 8 L 320 0 L 330 8 L 340 0 L 350 8 L 360 0 L 370 8 L 380 0 L 390 8 L 400 0 L 410 8 L 420 0 L 430 8 L 440 0 L 450 8 L 460 0 L 470 8 L 480 0 L 490 8 L 500 0 L 510 8 L 520 0 L 530 8 L 540 0 L 550 8 L 560 0 L 570 8 L 580 0 L 590 8 L 600 0 L 610 8 L 620 0 L 630 8 L 640 0 L 650 8 L 660 0 L 670 8 L 680 0 L 690 8 L 700 0 L 710 8 L 720 0 L 730 8 L 740 0 L 750 8 L 760 0 L 770 8 L 780 0 L 790 8 L 800 0 L 810 8 L 820 0 L 830 8 L 840 0 L 850 8 L 860 0 L 870 8 L 880 0 L 890 8 L 900 0" fill="#00B8FF" fill-opacity="0.14">
        <animate attributeName="fill-opacity" values="0.08;0.22;0.08" dur="4s" repeatCount="indefinite"/>
      </path>
      <path d="M 0 220 L 10 212 L 20 220 L 30 212 L 40 220 L 50 212 L 60 220 L 70 212 L 80 220 L 90 212 L 100 220 L 110 212 L 120 220 L 130 212 L 140 220 L 150 212 L 160 220 L 170 212 L 180 220 L 190 212 L 200 220 L 210 212 L 220 220 L 230 212 L 240 220 L 250 212 L 260 220 L 270 212 L 280 220 L 290 212 L 300 220 L 310 212 L 320 220 L 330 212 L 340 220 L 350 212 L 360 220 L 370 212 L 380 220 L 390 212 L 400 220 L 410 212 L 420 220 L 430 212 L 440 220 L 450 212 L 460 220 L 470 212 L 480 220 L 490 212 L 500 220 L 510 212 L 520 220 L 530 212 L 540 220 L 550 212 L 560 220 L 570 212 L 580 220 L 590 212 L 600 220 L 610 212 L 620 220 L 630 212 L 640 220 L 650 212 L 660 220 L 670 212 L 680 220 L 690 212 L 700 220 L 710 212 L 720 220 L 730 212 L 740 220 L 750 212 L 760 220 L 770 212 L 780 220 L 790 212 L 800 220 L 810 212 L 820 220 L 830 212 L 840 220 L 850 212 L 860 220 L 870 212 L 880 220 L 890 212 L 900 220" fill="#00B8FF" fill-opacity="0.14">
        <animate attributeName="fill-opacity" values="0.08;0.22;0.08" dur="4s" begin="1s" repeatCount="indefinite"/>
      </path>

      <!-- glossy scanline sweep -->
      <g opacity="0.06">
        <rect x="-260" y="-40" width="140" height="320" fill="#eaffff" transform="rotate(20)">
          <animateTransform attributeName="transform" type="translate" values="-100 0;1150 0" dur="5s" repeatCount="indefinite" additive="sum"/>
        </rect>
      </g>

      <!-- comet chasing the border -->
      <circle r="4" fill="#eaffff">
        <animateMotion dur="6s" repeatCount="indefinite">
          <mpath xlink:href="#borderPath"/>
        </animateMotion>
      </circle>
      <circle r="9" fill="#00B8FF" opacity="0.5">
        <animateMotion dur="6s" repeatCount="indefinite">
          <mpath xlink:href="#borderPath"/>
        </animateMotion>
      </circle>

      <!-- card border -->
      <rect x="1.5" y="1.5" width="897" height="217" rx="22" fill="none" stroke="url(#borderGlow)" stroke-width="2">
        <animate attributeName="stroke-width" values="1.5;2.6;1.5" dur="4s" repeatCount="indefinite"/>
      </rect>

      <!-- avatar -->
      <circle cx="115" cy="110" r="82" fill="url(#avatarGlow)">
        <animate attributeName="opacity" values="0.35;0.7;0.35" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="115" cy="110" r="70" fill="none" stroke="#00B8FF" stroke-width="2" stroke-dasharray="8 6" stroke-opacity="0.8">
        <animateTransform attributeName="transform" type="rotate" from="0 115 110" to="360 115 110" dur="9s" repeatCount="indefinite"/>
      </circle>
      <circle cx="115" cy="110" r="58" fill="none" stroke="#00B8FF" stroke-width="1" stroke-dasharray="2 5" stroke-opacity="0.5">
        <animateTransform attributeName="transform" type="rotate" from="360 115 110" to="0 115 110" dur="6s" repeatCount="indefinite"/>
      </circle>

      <g clip-path="url(#avatarClip)">
        <circle cx="115" cy="110" r="62" fill="url(#eyeBg)"/>
        <ellipse cx="115" cy="110" rx="40" ry="44" fill="url(#irisGrad)"/>
        <ellipse cx="115" cy="110" rx="8" ry="38" fill="#020608">
          <animate attributeName="ry" values="38;38;38;4;38;38" keyTimes="0;0.55;0.85;0.9;0.95;1" dur="6s" repeatCount="indefinite"/>
        </ellipse>
        <circle cx="101" cy="90" r="6" fill="#eaffff" opacity="0.85"/>
        <circle cx="115" cy="110" r="62" fill="none" stroke="#00223a" stroke-width="10" opacity="0.4"/>
      </g>
      <circle cx="115" cy="110" r="62" fill="none" stroke="#00B8FF" stroke-width="1.5" stroke-opacity="0.85"/>

      <!-- name, typed in -->
      <g clip-path="url(#typeClip)">
        <text x="230" y="88" font-family="Consolas, Monaco, monospace" font-size="40" font-weight="700" fill="#00B8FF">LawlessDragon</text>
      </g>
      <rect x="662" y="52" width="4" height="42" fill="#00B8FF" opacity="0">
        <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.01;0.5;1" dur="1s" begin="1.6s" repeatCount="indefinite"/>
      </rect>

      <!-- tagline -->
      <text x="231" y="118" font-family="Consolas, Monaco, monospace" font-size="15" fill="#7fb8d9" opacity="0">
        Android Developer &#183; Photographer &#183; Railfan
        <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.8s" fill="freeze"/>
      </text>

      <!-- divider -->
      <line x1="230" y1="146" x2="860" y2="146" stroke="#1c2733" stroke-width="1"/>
      <rect x="230" y="145" width="40" height="2" fill="#00B8FF" opacity="0.9">
        <animateTransform attributeName="transform" type="translate" values="0 0;590 0;0 0" dur="4s" begin="2.4s" repeatCount="indefinite"/>
      </rect>

      <!-- social row -->
      <a xlink:href="https://github.com/LawlessDragon" target="_blank">
        <circle cx="250" cy="185" r="15" fill="#0d1420" stroke="#00B8FF" stroke-width="1.5">
          <animate attributeName="r" values="15;16.5;15" dur="2s" repeatCount="indefinite" begin="0s"/>
        </circle>
        <text x="250" y="189" font-family="Consolas, Monaco, monospace" font-size="10" font-weight="700" fill="#00B8FF" text-anchor="middle">GH</text>
        <text x="272" y="190" font-family="Consolas, Monaco, monospace" font-size="14" fill="#c8dce8">LawlessDragon</text>
      </a>

      <a xlink:href="https://twitter.com/BlueLawless" target="_blank">
        <circle cx="470" cy="185" r="15" fill="#0d1420" stroke="#00B8FF" stroke-width="1.5">
          <animate attributeName="r" values="15;16.5;15" dur="2s" repeatCount="indefinite" begin="0.35s"/>
        </circle>
        <text x="470" y="189" font-family="Consolas, Monaco, monospace" font-size="10" font-weight="700" fill="#00B8FF" text-anchor="middle">X</text>
        <text x="492" y="190" font-family="Consolas, Monaco, monospace" font-size="14" fill="#c8dce8">@BlueLawless</text>
      </a>

      <a xlink:href="https://instagram.com/lawless_derg" target="_blank">
        <circle cx="680" cy="185" r="15" fill="#0d1420" stroke="#00B8FF" stroke-width="1.5">
          <animate attributeName="r" values="15;16.5;15" dur="2s" repeatCount="indefinite" begin="0.7s"/>
        </circle>
        <text x="680" y="189" font-family="Consolas, Monaco, monospace" font-size="10" font-weight="700" fill="#00B8FF" text-anchor="middle">IG</text>
        <text x="702" y="190" font-family="Consolas, Monaco, monospace" font-size="14" fill="#c8dce8">@lawless_derg</text>
      </a>
    </g>
  </g>
</svg>
