<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 800 300" width="100%" height="auto" preserveAspectRatio="xMidYMid meet"
     style="max-width: 800px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.6);">
  
  <defs>
    <!-- Cyberpunk Neon Drift Theme Gradients -->
    <linearGradient id="bannerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    
    <linearGradient id="avatarRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="50%" stop-color="#ff00ff"/>
      <stop offset="100%" stop-color="#00f5ff"/>
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    
    <clipPath id="avatarClip">
      <circle cx="120" cy="180" r="55"/>
    </clipPath>
    
    <!-- Geometric accent pattern -->
    <pattern id="geoPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <polygon points="20,0 40,20 20,40 0,20" fill="none" stroke="rgba(0,245,255,0.08)" stroke-width="1"/>
    </pattern>
    
    <!-- Animation Keyframes -->
    <style>
      @keyframes pulse-glow {
        0%, 100% { opacity: 0.6; r: 62; }
        50% { opacity: 0.9; r: 66; }
      }
      
      @keyframes pulse-ring {
        0%, 100% { stroke-width: 2; }
        50% { stroke-width: 3; }
      }
      
      @keyframes rotate-accent {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      @keyframes float-sparkle1 {
        0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.7; }
        50% { transform: translate(8px, -8px) scale(1.2); opacity: 1; }
      }
      
      @keyframes float-sparkle2 {
        0%, 100% { transform: translate(0, 0) scale(0.7); opacity: 0.5; }
        50% { transform: translate(-8px, 8px) scale(0.9); opacity: 0.8; }
      }
      
      @keyframes glow-pulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      
      @keyframes slide-in-name {
        0% { 
          opacity: 0;
          transform: translateX(-20px);
        }
        100% {
          opacity: 1;
          transform: translateX(0);
        }
      }
      
      @keyframes slide-in-info {
        0% {
          opacity: 0;
          transform: translateY(10px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      @keyframes bounce-online {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
      }
      
      #avatar-outer {
        animation: pulse-glow 3s ease-in-out infinite;
        transform-origin: 120px 180px;
      }
      
      #avatar-ring {
        animation: pulse-ring 3s ease-in-out infinite;
        transform-origin: 120px 180px;
      }
      
      #avatar-image {
        animation: slide-in-info 1s ease-out 0.3s backwards;
      }
      
      #status-indicator {
        animation: bounce-online 2s ease-in-out infinite;
        transform-origin: 165px 225px;
      }
      
      #username-text {
        animation: slide-in-name 0.8s ease-out 0.1s backwards;
      }
      
      #social-github {
        animation: slide-in-info 0.8s ease-out 0.4s backwards;
      }
      
      #social-twitter {
        animation: slide-in-info 0.8s ease-out 0.5s backwards;
      }
      
      #social-instagram {
        animation: slide-in-info 0.8s ease-out 0.6s backwards;
      }
      
      #neon-line-top {
        animation: glow-pulse 2s ease-in-out infinite;
      }
      
      #sparkle1 {
        animation: float-sparkle1 3s ease-in-out infinite;
        transform-origin: 680px 200px;
      }
      
      #sparkle2 {
        animation: float-sparkle2 3.5s ease-in-out infinite;
        transform-origin: 750px 160px;
      }
      
      #corner-accent-right {
        animation: glow-pulse 2.5s ease-in-out infinite;
      }
      
      #corner-accent-left {
        animation: glow-pulse 2.5s ease-in-out infinite 0.5s;
      }
    </style>
  </defs>
  
  <!-- Card Background with subtle pattern -->
  <rect width="800" height="300" rx="16" ry="16" fill="url(#cardGrad)"/>
  <rect width="800" height="300" rx="16" ry="16" fill="url(#geoPattern)"/>
  
  <!-- Neon Border Glow -->
  <rect x="1" y="1" width="798" height="298" rx="15" ry="15" 
        fill="none" stroke="url(#avatarRing)" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  
  <!-- Banner Section -->
  <rect width="800" height="140" rx="16" ry="16" fill="url(#bannerGrad)"/>
  <!-- Banner bottom edge fade -->
  <rect y="100" width="800" height="40" fill="url(#bannerGrad)" opacity="0.9"/>
  
  <!-- Animated GIF Banner Placeholder -->
  <image href="assets/banner.gif" x="0" y="0" width="800" height="140" 
         preserveAspectRatio="xMidYMid slice" clip-path="inset(0px round 16px 16px 0px 0px)"/>
  
  <!-- Banner overlay for readability -->
  <rect width="800" height="140" rx="16" ry="16" fill="rgba(15,12,41,0.3)"/>
  
  <!-- Decorative neon lines in banner -->
  <line x1="0" y1="138" x2="800" y2="138" stroke="#00f5ff" stroke-width="1" opacity="0.5" filter="url(#glow)"/>
  <line id="neon-line-top" x1="0" y1="140" x2="800" y2="140" stroke="#ff00ff" stroke-width="1"/>
  
  <!-- Avatar Section -->
  <!-- Avatar outer glow ring -->
  <circle id="avatar-outer" cx="120" cy="180" r="62" fill="none" stroke="url(#avatarRing)" stroke-width="4" 
          filter="url(#glow)"/>
  <!-- Avatar background ring -->
  <circle id="avatar-ring" cx="120" cy="180" r="58" fill="#0f0c29" stroke="#00f5ff" stroke-width="2"/>
  <!-- Avatar Image -->
  <image id="avatar-image" href="assets/Char.png" x="65" y="125" width="110" height="110" 
         clip-path="url(#avatarClip)" preserveAspectRatio="xMidYMid slice"/>
  
  <!-- Online Status Indicator (Discord-style) -->
  <circle cx="165" cy="225" r="14" fill="#1a1a2e" stroke="#00f5ff" stroke-width="2"/>
  <circle id="status-indicator" cx="165" cy="225" r="8" fill="#00f5ff" filter="url(#glow)"/>
  
  <!-- User Info Section -->
  <!-- Username -->
  <text id="username-text" x="210" y="165" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" 
        font-size="32" font-weight="700" fill="#ffffff" filter="url(#softShadow)">
    LawlessDragon
  </text>
  
  <!-- Decorative underline -->
  <line x1="210" y1="175" x2="380" y2="175" stroke="url(#avatarRing)" stroke-width="2" 
        stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Social Links with inline SVG icons -->
  <!-- GitHub -->
  <g id="social-github" transform="translate(210, 195)">
    <!-- GitHub Icon -->
    <svg x="0" y="0" width="18" height="18" viewBox="0 0 24 24" fill="#00f5ff">
      <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v 3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
    </svg>
    <text x="26" y="14" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" 
          font-size="15" font-weight="500" fill="#e0e0e0">
      GitHub: /LawlessDragon
    </text>
  </g>
  
  <!-- Twitter/X -->
  <g id="social-twitter" transform="translate(210, 222)">
    <!-- Twitter/X Icon -->
    <svg x="0" y="0" width="18" height="18" viewBox="0 0 24 24" fill="#ff00ff">
      <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
    </svg>
    <text x="26" y="14" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" 
          font-size="15" font-weight="500" fill="#e0e0e0">
      @BlueLawless
    </text>
  </g>
  
  <!-- Instagram -->
  <g id="social-instagram" transform="translate(210, 249)">
    <!-- Instagram Icon -->
    <svg x="0" y="0" width="18" height="18" viewBox="0 0 24 24" fill="#ff6b9d">
      <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.069-4.849.069-3.204 0-3.584-.011-4.849-.069-3.252-.148-4.771-1.691-4.919-4.919-.058-1.266-.069-1.644-.069-4.849 0-3.204.011-3.583.069-4.849.148-3.225 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zM5.838 12a6.162 6.162 0 1112.324 0 6.162 6.162 0 01-12.324 0zM12 16a4 4 0 100-8 4 4 0 000 8zm4.965-10.322a1.44 1.44 0 110-2.881 1.44 1.44 0 010 2.881z"/>
    </svg>
    <text x="26" y="14" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" 
          font-size="15" font-weight="500" fill="#e0e0e0">
      @lawless_derg
    </text>
  </g>
  
  <!-- Right Side Decorative Elements -->
  <!-- Neon corner accents -->
  <polyline id="corner-accent-right" points="750,260 780,260 780,230" fill="none" stroke="#00f5ff" stroke-width="2" 
            stroke-linecap="round" stroke-linejoin="round" opacity="0.6" filter="url(#glow)"/>
  <polyline id="corner-accent-left" points="50,260 20,260 20,230" fill="none" stroke="#ff00ff" stroke-width="2" 
            stroke-linecap="round" stroke-linejoin="round" opacity="0.6" filter="url(#glow)"/>
  
  <!-- Subtle decorative circles -->
  <circle cx="720" cy="60" r="25" fill="none" stroke="#00f5ff" stroke-width="1" opacity="0.15"/>
  <circle cx="720" cy="60" r="15" fill="none" stroke="#ff00ff" stroke-width="1" opacity="0.2"/>
  
  <!-- Small sparkle accents -->
  <g id="sparkle1">
    <path d="M0,-8 L1.5,-1.5 L8,0 L1.5,1.5 L0,8 L-1.5,1.5 L-8,0 L-1.5,-1.5 Z" fill="#00f5ff" filter="url(#glow)"/>
  </g>
  <g id="sparkle2">
    <path d="M0,-8 L1.5,-1.5 L8,0 L1.5,1.5 L0,8 L-1.5,1.5 L-8,0 L-1.5,-1.5 Z" fill="#ff00ff" filter="url(#glow)"/>
  </g>
  
</svg>
