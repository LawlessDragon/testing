<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d1a">
        <animate attributeName="stop-color" values="#0d0d1a;#1a0d2e;#0d0d1a" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#1a0d2e">
        <animate attributeName="stop-color" values="#1a0d2e;#0d1a2e;#1a0d2e" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0d1a2e">
        <animate attributeName="stop-color" values="#0d1a2e;#0d0d1a;#0d1a2e" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Card border glow -->
    <filter id="cardGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Avatar glow filter -->
    <filter id="avatarGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur">
        <animate attributeName="stdDeviation" values="4;6;4" dur="3s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text glow -->
    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="blur">
        <animate attributeName="stdDeviation" values="1.5;2.5;1.5" dur="4s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Particle gradient -->
    <radialGradient id="particleGrad">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Avatar clip path -->
    <clipPath id="avatarClip">
      <circle cx="110" cy="190" r="55"/>
    </clipPath>

    <!-- Banner mask for rounded top corners -->
    <clipPath id="bannerClip">
      <rect x="10" y="10" width="780" height="140" rx="12" ry="12"/>
    </clipPath>
  </defs>

  <!-- Main card background with rounded corners -->
  <rect x="5" y="5" width="790" height="290" rx="16" ry="16" fill="url(#bgGrad)" stroke="#2a2a4a" stroke-width="2" filter="url(#cardGlow)"/>

  <!-- Floating particles in background -->
  <g opacity="0.6">
    <circle cx="200" cy="80" r="2" fill="url(#particleGrad)">
      <animate attributeName="cy" values="80;50;80" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="120" r="1.5" fill="#ff00a0">
      <animate attributeName="cy" values="120;90;120" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="350;380;350" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="60" r="2.5" fill="#00f0ff">
      <animate attributeName="cy" values="60;30;60" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="100" r="1.8" fill="#ff00a0">
      <animate attributeName="cy" values="100;70;100" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="650;620;650" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="40" r="1.2" fill="#00f0ff">
      <animate attributeName="cy" values="40;20;40" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="720" cy="130" r="2" fill="#ff00a0">
      <animate attributeName="cy" values="130;100;130" dur="5.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="110" r="1.5" fill="#00f0ff">
      <animate attributeName="cy" values="110;80;110" dur="6.5s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="150;180;150" dur="6.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="580" cy="50" r="1" fill="#ff00a0">
      <animate attributeName="cy" values="50;25;50" dur="9s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Banner area -->
  <g clip-path="url(#bannerClip)">
    <image href="assets/banner.gif" x="10" y="10" width="780" height="140" preserveAspectRatio="xMidYMid slice"/>
    <!-- Subtle overlay on banner -->
    <rect x="10" y="10" width="780" height="140" fill="#000" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.25;0.15" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Banner bottom fade -->
  <rect x="10" y="130" width="780" height="20" fill="url(#bgGrad)" opacity="0.9"/>

  <!-- Avatar frame outer glow ring -->
  <circle cx="110" cy="190" r="60" fill="none" stroke="#00f0ff" stroke-width="3" opacity="0.8" filter="url(#avatarGlow)">
    <animate attributeName="stroke-width" values="3;5;3" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Avatar frame inner ring -->
  <circle cx="110" cy="190" r="57" fill="none" stroke="#ff00a0" stroke-width="1.5" opacity="0.6">
    <animate attributeName="r" values="57;58;57" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Avatar image - Updated with photo URL -->
  <image href="https://i.ibb.co/YT0JZW6Z/IMG-20241129-154137.jpg" x="55" y="135" width="110" height="110" clip-path="url(#avatarClip)" preserveAspectRatio="xMidYMid slice"/>

  <!-- Avatar status indicator dot -->
  <circle cx="155" cy="235" r="10" fill="#0d0d1a" stroke="#2a2a4a" stroke-width="2"/>
  <circle cx="155" cy="235" r="6" fill="#00f0ff">
    <animate attributeName="fill" values="#00f0ff;#00ff88;#00f0ff" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Username -->
  <text x="190" y="175" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff" filter="url(#textGlow)">
    LawlessDragon
    <animate attributeName="fill" values="#ffffff;#e0e0ff;#ffffff" dur="6s" repeatCount="indefinite"/>
  </text>

  <!-- Verified badge -->
  <g transform="translate(390, 155)">
    <circle cx="0" cy="0" r="10" fill="#5865F2">
      <animate attributeName="fill" values="#5865F2;#7289da;#5865F2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <path d="M-4 0 L-1 3 L4 -3" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Nitro badge -->
  <g transform="translate(415, 155)">
    <rect x="-10" y="-8" width="20" height="16" rx="3" fill="#ff73fa">
      <animate attributeName="fill" values="#ff73fa;#ff00a0;#ff73fa" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="0" y="3" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#fff" text-anchor="middle">N</text>
  </g>

  <!-- Divider line -->
  <line x1="190" y1="185" x2="750" y2="185" stroke="#2a2a4a" stroke-width="1">
    <animate attributeName="stroke" values="#2a2a4a;#3a3a6a;#2a2a4a" dur="5s" repeatCount="indefinite"/>
  </line>

  <!-- Social links with icons -->
  <g transform="translate(190, 205)">
    <!-- GitHub icon -->
    <g transform="translate(0, 0)">
      <circle cx="10" cy="10" r="10" fill="#1a1a2e" stroke="#00f0ff" stroke-width="1">
        <animate attributeName="stroke-opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
      </circle>
      <path d="M10 3 C6 3 3 6 3 10 C3 13 5 15 7 16 C7 16 7 15 7 15 C5 14 5 12 5 12 C5 12 5 12 5 11 C5 11 6 11 6 11 C7 11 7 12 7 12 C8 12 8 11 9 11 C6 11 5 9 5 7 C5 6 6 5 6 4 C6 4 6 3 7 2 C7 2 8 3 8 4 C8 5 8 6 8 7 C8 9 7 10 5 10 M7 14 C7 14 7 13 7 13" 
            fill="#00f0ff" transform="translate(2,2) scale(0.6)"/>
    </g>
    <text x="28" y="14" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#b0b0d0">
      GitHub: /LawlessDragon
    </text>
  </g>

  <g transform="translate(190, 235)">
    <!-- Twitter/X icon -->
    <g transform="translate(0, 0)">
      <circle cx="10" cy="10" r="10" fill="#1a1a2e" stroke="#ff00a0" stroke-width="1">
        <animate attributeName="stroke-opacity" values="1;0.5;1" dur="3.5s" repeatCount="indefinite"/>
      </circle>
      <path d="M14 4 L15 4 L11 9 L16 15 L12 15 L9 11 L6 15 L5 15 L9 9 L4 4 L8 4 L11 8 L14 4 Z" 
            fill="#ff00a0" transform="translate(2,2) scale(0.6)"/>
    </g>
    <text x="28" y="14" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#b0b0d0">
      @BlueLawless
    </text>
  </g>

  <g transform="translate(190, 265)">
    <!-- Instagram icon -->
    <g transform="translate(0, 0)">
      <circle cx="10" cy="10" r="10" fill="#1a1a2e" stroke="#ff00a0" stroke-width="1">
        <animate attributeName="stroke-opacity" values="1;0.5;1" dur="4s" repeatCount="indefinite"/>
      </circle>
      <rect x="5" y="5" width="10" height="10" rx="3" ry="3" fill="none" stroke="#ff00a0" stroke-width="1.2" transform="translate(2,2) scale(0.6)"/>
      <circle cx="10" cy="10" r="2.5" fill="none" stroke="#ff00a0" stroke-width="1.2" transform="translate(2,2) scale(0.6)"/>
      <circle cx="13" cy="7" r="0.8" fill="#ff00a0" transform="translate(2,2) scale(0.6)"/>
    </g>
    <text x="28" y="14" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#b0b0d0">
      @lawless_derg
    </text>
  </g>

  <!-- About Me section on the right -->
  <g transform="translate(520, 205)">
    <text x="0" y="0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="#ff00a0" letter-spacing="1">
      ABOUT ME
      <animate attributeName="fill" values="#ff00a0;#ff73fa;#ff00a0" dur="4s" repeatCount="indefinite"/>
    </text>
    <text x="0" y="18" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#a0a0c0">
      Code-slayer. Dragon-tamer. Creating
    </text>
    <text x="0" y="34" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#a0a0c0">
      digital realms. | Dev | Designer |
    </text>
    <text x="0" y="50" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#a0a0c0">
      @BlueLawless | Living the lawless life!
    </text>
  </g>

  <!-- Decorative corner accents -->
  <path d="M 15 15 L 35 15 L 35 20 L 20 20 L 20 35 L 15 35 Z" fill="#00f0ff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M 785 15 L 765 15 L 765 20 L 780 20 L 780 35 L 785 35 Z" fill="#ff00a0" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3.5s" repeatCount="indefinite"/>
  </path>
  <path d="M 15 285 L 35 285 L 35 280 L 20 280 L 20 265 L 15 265 Z" fill="#ff00a0" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="4s" repeatCount="indefinite"/>
  </path>
  <path d="M 785 285 L 765 285 L 765 280 L 780 280 L 780 265 L 785 265 Z" fill="#00f0ff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3.2s" repeatCount="indefinite"/>
  </path>
</svg>
