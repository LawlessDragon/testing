<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1000 400" preserveAspectRatio="xMidYMid meet">
  
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1d3a"/>
    </linearGradient>
    
    <radialGradient id="avatarGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#00a8cc"/>
    </radialGradient>
    
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.8"/>
    </filter>
    
    <clipPath id="avatarClip">
      <circle cx="150" cy="200" r="85"/>
    </clipPath>
    
    <clipPath id="profileClip">
      <circle cx="600" cy="120" r="70"/>
    </clipPath>
    
    <!-- Animations -->
    <style>
      @keyframes rotate-ring {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      @keyframes pulse-avatar {
        0%, 100% { 
          r: 85;
          opacity: 1;
        }
        50% { 
          r: 90;
          opacity: 0.7;
        }
      }
      
      @keyframes glow-border {
        0%, 100% { 
          stroke-width: 3;
          opacity: 0.8;
        }
        50% { 
          stroke-width: 4;
          opacity: 1;
        }
      }
      
      @keyframes shimmer {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.8; }
      }
      
      @keyframes slide-right {
        0% {
          opacity: 0;
          transform: translateX(-30px);
        }
        100% {
          opacity: 1;
          transform: translateX(0);
        }
      }
      
      @keyframes float-up {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-5px); }
      }
      
      @keyframes rotate-profile {
        0%, 100% { transform: rotate(0deg) scale(1); }
        50% { transform: rotate(2deg) scale(1.02); }
      }
      
      @keyframes line-expand {
        0% { 
          stroke-dasharray: 0, 300;
          opacity: 0;
        }
        100% { 
          stroke-dasharray: 300, 300;
          opacity: 1;
        }
      }
      
      @keyframes text-glow {
        0%, 100% { filter: drop-shadow(0 0 10px rgba(0,245,255,0.3)); }
        50% { filter: drop-shadow(0 0 20px rgba(0,245,255,0.6)); }
      }
      
      #ring-outer {
        animation: rotate-ring 8s linear infinite;
        transform-origin: 150px 200px;
      }
      
      #avatar-circle {
        animation: pulse-avatar 3s ease-in-out infinite;
      }
      
      #avatar-border {
        animation: glow-border 2.5s ease-in-out infinite;
      }
      
      #profile-circle {
        animation: rotate-profile 4s ease-in-out infinite;
      }
      
      #profile-border {
        animation: glow-border 2s ease-in-out infinite;
      }
      
      #username {
        animation: slide-right 0.8s ease-out, text-glow 3s ease-in-out infinite 0.8s;
      }
      
      #tagline {
        animation: slide-right 1s ease-out 0.2s backwards, float-up 3s ease-in-out infinite 0.8s;
      }
      
      #underline {
        animation: line-expand 1.2s ease-out 0.4s backwards;
        stroke-dasharray: 300;
      }
      
      #social-line {
        animation: shimmer 2.5s ease-in-out infinite 0.6s;
      }
      
      .social-icon {
        animation: float-up 3s ease-in-out infinite;
      }
      
      .social-icon:nth-child(2) { animation-delay: 0s; }
      .social-icon:nth-child(3) { animation-delay: 0.2s; }
      .social-icon:nth-child(4) { animation-delay: 0.4s; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="400" fill="url(#bgGrad)"/>
  
  <!-- Animated Background Grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,245,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1000" height="400" fill="url(#grid)"/>
  
  <!-- LEFT SECTION: Big Avatar -->
  <!-- Rotating Ring Background -->
  <g id="ring-outer">
    <defs>
      <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#00f5ff"/>
        <stop offset="50%" stop-color="#ff00ff"/>
        <stop offset="100%" stop-color="#00f5ff"/>
      </linearGradient>
    </defs>
    <circle cx="150" cy="200" r="100" fill="none" stroke="url(#ringGrad)" stroke-width="2" opacity="0.4"/>
    <circle cx="150" cy="200" r="95" fill="none" stroke="url(#ringGrad)" stroke-width="1" opacity="0.2"/>
  </g>
  
  <!-- Avatar Outer Circle (pulsing) -->
  <circle id="avatar-circle" cx="150" cy="200" r="85" fill="none" stroke="#00f5ff" stroke-width="3" 
          filter="url(#glow)" opacity="0.6"/>
  
  <!-- Avatar Border (glowing) -->
  <circle id="avatar-border" cx="150" cy="200" r="82" fill="none" stroke="#00f5ff" stroke-width="2" 
          filter="url(#glow)"/>
  
  <!-- Avatar Background -->
  <circle cx="150" cy="200" r="80" fill="rgba(10,14,39,0.8)"/>
  
  <!-- Avatar Image -->
  <image href="https://raw.githubusercontent.com/LawlessDragon/testing/refs/heads/main/assets/Char.png" 
         x="70" y="120" width="160" height="160" 
         clip-path="url(#avatarClip)" preserveAspectRatio="xMidYMid slice" filter="url(#shadow)"/>
  
  <!-- Avatar Shine Overlay -->
  <circle cx="150" cy="200" r="80" fill="rgba(255,255,255,0.05)"/>
  
  <!-- RIGHT SECTION: Profile Info -->
  <!-- Top: Profile Circle -->
  <circle id="profile-circle" cx="600" cy="120" r="70" fill="rgba(0,245,255,0.1)" 
          clip-path="url(#profileClip)"/>
  
  <circle id="profile-border" cx="600" cy="120" r="70" fill="none" stroke="#00f5ff" 
          stroke-width="3" filter="url(#glow)"/>
  
  <image href="https://raw.githubusercontent.com/LawlessDragon/testing/refs/heads/main/assets/Char.png" 
         x="530" y="50" width="140" height="140" 
         clip-path="url(#profileClip)" preserveAspectRatio="xMidYMid slice" filter="url(#shadow)"/>
  
  <!-- Name Section -->
  <text id="username" x="700" y="90" font-family="'Arial', 'Helvetica', sans-serif" 
        font-size="56" font-weight="900" fill="#ffffff" letter-spacing="2">
    LAWLESSDRAGON
  </text>
  
  <text id="tagline" x="700" y="140" font-family="'Arial', 'Helvetica', sans-serif" 
        font-size="18" fill="#00f5ff" font-weight="300" letter-spacing="1">
    Creator • Developer • Digital Artist
  </text>
  
  <!-- Decorative Line Under Name -->
  <line id="underline" x1="700" y1="155" x2="950" y2="155" stroke="#ff00ff" stroke-width="3" 
        stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- BOTTOM SECTION: Social Links -->
  <line id="social-line" x1="300" y1="260" x2="900" y2="260" stroke="#00f5ff" stroke-width="2" 
        opacity="0.5" stroke-dasharray="5,5"/>
  
  <!-- Social Icons & Text -->
  <g class="social-icon">
    <a href="https://github.com/LawlessDragon" target="_blank">
      <circle cx="330" cy="310" r="25" fill="none" stroke="#00f5ff" stroke-width="2" filter="url(#glow)"/>
      <text x="330" y="318" font-family="Arial" font-size="24" fill="#00f5ff" text-anchor="middle" 
            font-weight="bold">GH</text>
      <text x="380" y="318" font-family="Arial" font-size="14" fill="#e0e0e0">GitHub</text>
    </a>
  </g>
  
  <g class="social-icon">
    <a href="https://twitter.com/BlueLawless" target="_blank">
      <circle cx="520" cy="310" r="25" fill="none" stroke="#ff00ff" stroke-width="2" filter="url(#glow)"/>
      <text x="520" y="318" font-family="Arial" font-size="24" fill="#ff00ff" text-anchor="middle" 
            font-weight="bold">𝕏</text>
      <text x="570" y="318" font-family="Arial" font-size="14" fill="#e0e0e0">Twitter</text>
    </a>
  </g>
  
  <g class="social-icon">
    <a href="https://instagram.com/lawless_derg" target="_blank">
      <circle cx="710" cy="310" r="25" fill="none" stroke="#ff6b9d" stroke-width="2" filter="url(#glow)"/>
      <text x="710" y="318" font-family="Arial" font-size="24" fill="#ff6b9d" text-anchor="middle" 
            font-weight="bold">📷</text>
      <text x="760" y="318" font-family="Arial" font-size="14" fill="#e0e0e0">Instagram</text>
    </a>
  </g>
  
  <!-- Additional Decorative Elements -->
  <circle cx="920" cy="350" r="3" fill="#00f5ff" opacity="0.6"/>
  <circle cx="90" cy="350" r="3" fill="#ff00ff" opacity="0.6"/>
  
  <!-- Corner Accents -->
  <line x1="50" y1="380" x2="90" y2="380" stroke="#00f5ff" stroke-width="2" opacity="0.5"/>
  <line x1="50" y1="380" x2="50" y2="340" stroke="#00f5ff" stroke-width="2" opacity="0.5"/>
  
  <line x1="950" y1="20" x2="950" y2="60" stroke="#ff00ff" stroke-width="2" opacity="0.5"/>
  <line x1="910" y1="20" x2="950" y2="20" stroke="#ff00ff" stroke-width="2" opacity="0.5"/>
  
</svg>
